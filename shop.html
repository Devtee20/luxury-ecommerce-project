<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP</title>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #f5f3ee;
      color: #111;
    }

    /* MAIN CONTAINER */
    #products-container {
      max-width: 1400px;
      margin: 100px auto;
      padding: 0 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 80px 60px;
    }

    .image-wrapper {
      /* border: 2px solid red; */
      background: #f0f2f5;
      background: #fff;
      padding: 30px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* PRODUCT CARD */
    .product-card {
      cursor: pointer;
      transition: 0.4s ease;
    }

    .product-card:hover {
      transform: translateY(-10px);
    }

    /* IMAGE AREA */
   
    .image-wrapper img {
      width: 100%;
      height: 280px;
      object-fit: contain;
    }

    /* INFO SECTION */
    .product-info h3 {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 5px;
    }

    .category {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 15px;
    }

    .description {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 15px;
    }

    .price {
      font-size: 16px;
      font-weight: 600;
    }

    .site-header {
      padding: 20px 60px;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .search-area {
      display: flex;
      gap: 10px;
    }

    #search-input {
      padding: 12px;
      width: 300px;
      border: 1px solid #ddd;
    }

    #filter-category {
      padding: 12px;
      border: 1px solid #ddd;
    }
  </style>

</head>

<body>


  <header class="site-header">

    <div class="nav-bar">

      <h2 class="logo">LUXE</h2>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="#">Shop</a>
        <a href="#">Categories</a>
        <a href="cart.html">Cart</a>
      </nav>

    </div>

    <div class="search-area">

      <select id="filter-category">
        <option value="">Filters</option>
        <option value="shoes">Shoes</option>
        <option value="clothing">Clothing</option>
        <option value="bags">Bags</option>
        <option value="accessories">Accessories</option>
        <option value="fragrance">Fragrance</option>
      </select>

      <input type="text" id="search-input" placeholder="Search luxury products...">

    </div>

  </header>
  <!-- <h1>Products</h1> -->
  <div id="products-container"></div>
 


</body>
<script type="module" src="./js/products.js"></script>

</html>
